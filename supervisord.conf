[supervisord]
nodaemon=true
logfile=/app/supervisor.log

[program:api]
command=uvicorn api:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/api.log
stderr_logfile=/app/api_error.log

[program:dashboard]
command=streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/dashboard.log
stderr_logfile=/app/dashboard_error.log
